<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link rel="icon" href="favicon.ico"> -->
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <title>AI Robot</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="hero">
        <h1>AI ROBOT</h1>
        <p>Interactive CSS + JavaScript Assistant</p>
    </div>

    <div class="scene">

        <div class="robot" role="img" aria-label="Interactive AI Robot">

            <!-- Antenna -->
            <div class="antenna"></div>

            <!-- Head -->
            <div class="head">

                <div class="ear left-ear"></div>
                <div class="ear right-ear"></div>

                <div class="face-panel">

                    <div class="eye left-eye">
                        <div class="pupil"></div>
                    </div>

                    <div class="eye right-eye">
                        <div class="pupil"></div>
                    </div>

                    <div class="mouth"></div>

                    <div class="status">
                        ONLINE
                    </div>

                </div>

            </div>

            <!-- Neck -->
            <div class="neck"></div>

            <!-- Body -->
            <div class="body">

                <!-- <div class="screen">
                    <div class="scan-line"></div>
                    <div class="hud-circle"></div>
                </div> -->
                <div class="screen">

                    <div class="scan-line"></div>

                    <div class="hud-circle"></div>

                    <div class="screen-content">
                        <div class="screen-title">SYSTEM</div>
                        <div class="screen-value">98%</div>
                    </div>

                </div>

                <div class="panel-row">
                    <div class="indicator green"></div>
                    <div class="indicator blue"></div>
                    <div class="indicator red"></div>
                </div>

                <div class="telemetry">

                    <div class="battery">
                        <span>🔋 98%</span>
                    </div>

                    <div class="signal">
                        <span>📡 ONLINE</span>
                    </div>

                </div>

                <div class="robot-name">
                    AI-01
                </div>

            </div>

            <!-- Left Arm -->
            <div class="arm left-arm">

                <div class="shoulder"></div>

                <div class="hand">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

            </div>

            <!-- Right Arm -->
            <div class="arm right-arm">

                <div class="shoulder"></div>

                <div class="hand">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

            </div>

            <!-- Legs -->
            <div class="leg left-leg">
                <div class="knee"></div>
                <div class="foot"></div>
            </div>

            <div class="leg right-leg">
                <div class="knee"></div>
                <div class="foot"></div>
            </div>

        </div>

        <!-- Ground Platform -->
        <div class="platform"></div>

        <div class="commands">

            <h3>Commands</h3>

            <ul>
                <li>A → Analyze</li>
                <li>S → Scan</li>
                <li>P → Process</li>
                <li>R → Ready</li>
                <li>O → Online</li>
                <li>Click → Speak</li>
                <li>Double Click → Boost Mode</li>
            </ul>

        </div>

        <div class="footer-badge">
            Powered by HTML • CSS • JavaScript
        </div>

    </div>

    <div class="particles"></div>

    <button class="theme-toggle">
        🌙
    </button>

    <script src="js/script.js"></script>
</body>

</html>
